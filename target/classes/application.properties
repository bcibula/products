# Name of the Spring Boot application.
spring.application.name=products

# Database connection settings.
# Connect to the "smartshop" MySQL database running on localhost.
spring.datasource.url=jdbc:mysql://localhost:3306/smartshop
spring.datasource.username=root
spring.datasource.password=root

# Keep the database schema synchronized with the entity classes.
# "update" adds or modifies tables without deleting existing data.
spring.jpa.hibernate.ddl-auto=update

# Display SQL statements in the console for debugging.
spring.jpa.show-sql=true

# Always run data.sql when the application starts.
# This ensures the sample products are loaded into MySQL.
spring.sql.init.mode=always

